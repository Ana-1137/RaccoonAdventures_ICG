<!DOCTYPE html>

<html lang="en">

<head>

	<title>three.js example 01 &mdash; 3 boxes</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": {
     			 "three": "https://threejs.org/build/three.module.js"
    		}
  		}
	</script>

	<script type="module">

		import * as THREE from 'three';

		// Once everything is loaded, run this function

		function init() {

			// The SCENE

			const scene = new THREE.Scene();
			scene.background = new THREE.Color(0x534a4a);

			// The MODELS --- Boxes are added to the scene

			// Preciso de construir um rubik's cube, simples. Preciso de uma função para criar um cubo, e depois preciso de criar 27 cubos, e posicioná-los corretamente para formar o rubik's cube.
			const edges_material = new THREE.MeshBasicMaterial({ color: 0x000000 });

			function createCube(x, y, z, color) {
				const cube_geometry = new THREE.BoxGeometry(20, 20, 20);
				const cube_material = new THREE.MeshBasicMaterial({ color: color });
				const cube = new THREE.Mesh(cube_geometry, cube_material);
				cube.position.set(x, y, z);
				scene.add(cube);				
				
				const cube_edges = new THREE.WireframeGeometry(cube_geometry);
				const cube_line_segments = new THREE.LineSegments(cube_edges, edges_material);
				cube_line_segments.position.set(x, y, z);
				scene.add(cube_line_segments);
			}

			// Create the Rubik's Cube
			for (let x = -25; x <= 25; x += 25) {
				for (let y = -25; y <= 25; y += 25) {
					for (let z = -25; z <= 25; z += 25) {
						createCube(x, y, z, Math.random() * 0xffffff);
					}
				}
			}

			// The CAMERA --- A camera is added to the scene
			// 			  --- Where the viewer is and how he is looking at the scene

			const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 1000);

			camera.position.z = 90;
			camera.position.y = 90;

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)

			// The RENDERER --- To display the scene on the Web page

			const renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			// Add the output of the renderer

			document.body.appendChild(renderer.domElement);

			// Render the scene

			renderer.render(scene, camera);
		}

		window.onload = init

	</script>

</body>

</html>
