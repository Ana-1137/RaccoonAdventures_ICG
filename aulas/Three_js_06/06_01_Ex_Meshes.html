<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Three.js - Meshes - BufferGeometry</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111111;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://threejs.org/build/three.module.js",
            "three/addons/": "https://threejs.org/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/controls/OrbitControls.js";
        import { VertexNormalsHelper } from "three/addons/helpers/VertexNormalsHelper.js";

        const sceneElements = {
            sceneGraph: null,
            camera: null,
            renderer: null,
            control: null
        };

        const helper = {
            initEmptyScene: function (elements) {
                elements.sceneGraph = new THREE.Scene();
                const width = window.innerWidth;
                const height = window.innerHeight;

                elements.camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 500);
                elements.camera.position.set(8, 10, 15);

                // --- LIGHTING ---
                elements.sceneGraph.add(new THREE.AmbientLight(0xffffff, 0.4));
                const light_1 = new THREE.DirectionalLight(0xffffff, 1.5);
                light_1.position.set(5, 10, 7);
                elements.sceneGraph.add(light_1);

                // --- RENDERER ---
                elements.renderer = new THREE.WebGLRenderer({ antialias: true });
                elements.renderer.setPixelRatio(window.devicePixelRatio);
                elements.renderer.setSize(width, height);
                document.body.appendChild(elements.renderer.domElement);

                elements.control = new OrbitControls(elements.camera, elements.renderer.domElement);
            },

            render: function (elements) {
                elements.renderer.render(elements.sceneGraph, elements.camera);
            }
        };

        const scene = {
            load3DObjects: function (sceneGraph) {
                // PYRAMID

                // 1. Define the Vertices (x, y, z)
                // v0: Top, v1-v4: Base corners
                const vertices = new Float32Array([
                    0, 3, 0,     // index 0: Peak
                    -2, 0, 2,    // index 1: Front-Left
                    2, 0, 2,     // index 2: Front-Right
                    2, 0, -2,    // index 3: Back-Right
                    -2, 0, -2    // index 4: Back-Left
                ]);

                // 2. Define the Vertex Indices for each triangular face
                // Counter-clockwise order for outward-facing normals
                const indices = [
                    0, 1, 2,    // Front Face
                    0, 2, 3,    // Right Face
                    0, 3, 4,    // Back Face
                    0, 4, 1,    // Left Face
                    1, 3, 2,    // Base Tri 1
                    1, 4, 3     // Base Tri 2
                ];

                // 3. Create the BufferGeometry
                const geometry = new THREE.BufferGeometry();

                // Set the 'position' attribute (3 coord values per vertex)
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

                // Set the 'index' attribute for face definition
                geometry.setIndex(indices);

                // 4. Compute Normals (Essential for lighting/shading)
                geometry.computeVertexNormals();

                // 5. Create Mesh
                const material = new THREE.MeshPhongMaterial({
                    color: 0x00c8ff,
                    specular: 0xffffff,
                    shininess: 100,
                    flatShading: true // Makes the edges "sharper"
                });

                const pyramid = new THREE.Mesh(geometry, material);

                // 6. Move to the left
                pyramid.translateX(-5);

                sceneGraph.add(pyramid);

                // TASK5.1.3: Add a triangular prism to the scene, by defining its mesh vertices and triangles.
                ///////////////////////////////////////////////////////////////////////////
                const vertices_prism = new Float32Array([
                    // Base (no chão, y = 0)
                    -1, 0, 1,    // v0: Base-Front-Left
                    1, 0, 1,     // v1: Base-Front-Right
                    0, 0, -1,    // v2: Base-Back-Center

                    // Top (em pé, y = altura)
                    -1, 5, 1,    // v3: Top-Front-Left
                    1, 5, 1,     // v4: Top-Front-Right
                    0, 5, -1     // v5: Top-Back-Center
                ]);

                const indices_prism = [
                    // Base (triângulo no chão, sentido anti-horário visto de cima)
                    0, 2, 1,
                    // Top (triângulo em cima, sentido horário visto de cima)
                    3, 4, 5,
                    // Lateral 1 (entre v0-v1-v4-v3)
                    0, 1, 4,
                    0, 4, 3,
                    // Lateral 2 (entre v1-v2-v5-v4)
                    1, 2, 5,
                    1, 5, 4,
                    // Lateral 3 (entre v2-v0-v3-v5)
                    2, 0, 3,
                    2, 3, 5
                ];

                const geometry_prism = new THREE.BufferGeometry();
                geometry_prism.setAttribute('position', new THREE.BufferAttribute(vertices_prism, 3));
                geometry_prism.setIndex(indices_prism);
                geometry_prism.computeVertexNormals();
                const material_prism = new THREE.MeshPhongMaterial({
                    color: 0x00c8ff,
                    specular: 0xffffff,
                    shininess: 100,
                    flatShading: true
                });

                const prism = new THREE.Mesh(geometry_prism, material_prism);
                
                prism.translateX(0); // Move to the right
                // prism.rotation.x = Math.PI / 2;

                
                sceneGraph.add(prism);
                ///////////////////////////////////////////////////////////////////////////

                // Add a helper grid for context
                const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
                sceneGraph.add(grid);

                // TASK5.1.2: Visualize the unit normal vectors that are computed for each mesh vertex, by averaging the normal vectors of the triangles sharing each vertex. Use the VertexNormalsHelper
                const vertexNormalsHelper = new VertexNormalsHelper(pyramid, 0.5, 0xff0000);
                const vertexNormalsHelper_prism = new VertexNormalsHelper(prism, 0.5, 0xff0000);
                sceneGraph.add(vertexNormalsHelper);
                sceneGraph.add(vertexNormalsHelper_prism);
            }
        };

        function computeFrame() {
            helper.render(sceneElements);
            requestAnimationFrame(computeFrame);
        }

        function init() {
            helper.initEmptyScene(sceneElements);
            scene.load3DObjects(sceneElements.sceneGraph);
            computeFrame();
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            sceneElements.camera.aspect = w / h;
            sceneElements.camera.updateProjectionMatrix();
            sceneElements.renderer.setSize(w, h);
        });

        init();
    </script>
</head>

<body>
</body>

</html>
