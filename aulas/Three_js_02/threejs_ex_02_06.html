<html lang="en">

<head>

	<title>three.js example</title>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

	<style>
		body {

			background-color: #ffffff;

			/* To use the complete page */

			margin: 0px;

			overflow: hidden;
		}
	</style>

</head>

<body>

	<!-- Div which will hold the renderer output -->

	<div id="WebGL-output"> </div>

	<!-- The library -->

	<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

	<script type="importmap">
		{
    		"imports": { 
                 "three": "https://threejs.org/build/three.module.js", 
                 "three/addons/": "https://threejs.org/examples/jsm/" 
            } 
  		}
	</script>

	<!-- Javascript code that runs the Three.js example -->

	<script type="module">

		import * as THREE from 'three';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

		// Once everything is loaded, run this function
		let camera, renderer;

		function init() {

			// The SCENE

			const scene = new THREE.Scene();
			scene.background = new THREE.Color(0x131335); 

			// The GROUND plane

			const planeGeometry = new THREE.PlaneGeometry(60, 20);
			const planeMaterial = new THREE.MeshPhongMaterial({ color: 0xcccccc});
			const plane = new THREE.Mesh(planeGeometry, planeMaterial);

			const size = 70;
			const divisions = 50;
			const gridHelper = new THREE.GridHelper( size, divisions );
			//scene.add( gridHelper );

			// Rotate and position the plane

			plane.rotation.x = -0.5 * Math.PI; // TODO: What happens if you comment out this line of code?
			plane.position.x = 15;
			plane.position.y = 0;
			plane.position.z = 0;

			// Add to the scene

			scene.add(plane);

			// Add coordinate AXIS to the scene

			const axes = new THREE.AxesHelper(20);

			scene.add(axes);

			// A CUBE

			const cubeGeometry = new THREE.BoxGeometry(3, 3, 3);
			const cubeMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 200 });
			const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);

			// Position the cube and add it to the scene
			// TODO: What happens if you comment out the next three lines of code?
			cube.position.x = -7;
			cube.position.y = 1.5;
			cube.position.z = -3;

			scene.add(cube);

			// A SPHERE
			const sphereGeometry = new THREE.SphereGeometry(3, 12, 12);
			const sphereMaterial = new THREE.MeshPhongMaterial({ color: 0x7777ff, shininess: 200 });
			const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);

			// Position the sphere and add it to the scene
			// TODO: What happens if you comment out the next three lines of code?
			sphere.position.x = 15;
			sphere.position.y = 3;
			sphere.position.z = 6;

			// TODO; What happens if you increase or decrease the radius of the sphere?

			// add the sphere to the scene
			scene.add(sphere);


			// A CYLINDER
			const cylinderGeometry = new THREE.CylinderGeometry(2, 2, 5, 12); // raio superior, raio inferior, altura, número de segmentos radiais
			const cylinderMaterial = new THREE.MeshPhongMaterial({ color: 0xffff00, shininess: 200 }); // yellow color
			const cylinder = new THREE.Mesh(cylinderGeometry, cylinderMaterial);

			// Position the cylinder and add it to the scene
			// TODO: What happens if you comment out the next three lines of code?
			cylinder.position.x = 0;
			cylinder.position.y = 2.5;
			cylinder.position.z = -2;

			scene.add(cylinder);

			// cone geometry
			const coneGeometry = new THREE.ConeGeometry(3, 10, 10); // radius, height, radialSegments
			const coneMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00, shininess: 200 }); // green color
			const cone = new THREE.Mesh(coneGeometry, coneMaterial);
			
			// Position the cone and add it to the scene
			cone.position.x = 25;
			cone.position.y = 5;
			cone.position.z = -3;

			scene.add(cone);

			// Cylinder geometry with different top and bottom radius
			const truncatedConeGeometry = new THREE.CylinderGeometry(1, 3, 10, 12); // top radius, bottom radius, height, radialSegments
			const truncatedConeMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff, shininess: 200 }); //blue color
			const truncatedCone = new THREE.Mesh(truncatedConeGeometry, truncatedConeMaterial);
			
			// Position the truncated cone and add it to the scene
			truncatedCone.position.x = 30;
			truncatedCone.position.y = 5;
			truncatedCone.position.z = 5;

			scene.add(truncatedCone);

			// Torus
			const torusGeometry = new THREE.TorusGeometry(4, 1.5, 20, 24); // radius, tube diameter, radialSegments, tubularSegments
			const torusMaterial = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 200 }); // magenta color
			const torus = new THREE.Mesh(torusGeometry, torusMaterial);	

			// Position the torus and add it to the scene
			torus.position.x = 9;	
			torus.position.y = 5.5;
			torus.position.z = -2;

			scene.add(torus);



			// SPOT LIGHT
			const spotLight = new THREE.SpotLight(0x91d2f4, 8000);
			spotLight.position.set(-5, 45, -30);
			spotLight.castShadow = true;
			scene.add(spotLight);

			const spotLight2 = new THREE.SpotLight(0x91d2f4, 8000);
			spotLight2.position.set(15, 45, 10);
			spotLight2.castShadow = true;
			scene.add(spotLight2);

			// AMBIENT LIGHT
			const ambientLight = new THREE.AmbientLight(0x073763);	//blueish ambient light
			scene.add(ambientLight);

			


			// The CAMERA - OrthographicCamera

			// --- Where the viewer is and how he is looking at the scene

			camera = new THREE.OrthographicCamera( window.innerWidth / - 20, window.innerWidth / 20, window.innerHeight / 20, window.innerHeight / - 20, 1, 1000 );
			// Position the camera

			camera.position.x = -40;
			camera.position.y = 50;
			camera.position.z = 30;

			// Point the camera to the center of the scene

			camera.lookAt(scene.position);

			scene.add(camera)

			// The RENDERER --- To display the scene on the Web page

			renderer = new THREE.WebGLRenderer({ antialias: true });

			renderer.setClearColor(new THREE.Color(0xffffff));

			renderer.setPixelRatio(window.devicePixelRatio);

			renderer.setSize(window.innerWidth, window.innerHeight);

			// Add the output of the renderer to the html element

			document.getElementById("WebGL-output").appendChild(renderer.domElement);

			
			// SHADOWS
			renderer.shadowMap.enabled = true;
			plane.receiveShadow = true; 
			cube.castShadow = true;
			cube.receiveShadow = true;
			sphere.castShadow = true;
			sphere.receiveShadow = true;
			cylinder.castShadow = true;
			cylinder.receiveShadow = true;
			cone.castShadow = true; 
			cone.receiveShadow = true; 
			truncatedCone.castShadow = true;
			truncatedCone.receiveShadow = true;	
			torus.castShadow = true;
			torus.receiveShadow = true;
			spotLight.castShadow = true;
			spotLight2.castShadow = true;
			ambientLight.castShadow = true;
			
			// Render the scene

			renderer.render(scene, camera);

			// --- INTERACTION --- 
			const controls = new OrbitControls(camera, renderer.domElement); 
			controls.enableDamping = true; 

			// ANIMATION
			var step = 0;
			// Update model features and render the scene
			renderScene()

			function renderScene() {
			// Rotate the cube around its axes
			cube.rotation.x += 0.02;
			cube.rotation.y += 0.02;
			cube.rotation.z += 0.02;

			step += 0.04;
			// Bounce the sphere up and down
			sphere.position.x = 20 + (10 * Math.cos(step));
			sphere.position.y = 3 + (10 * Math.abs(Math.sin(step)));

			// rotate  the  torus  around  its  XX  axis  and  to  shuffle  the  cylinder  back-and-forth in the ZZ direction.
			torus.rotation.x += 0.1;
			cylinder.position.z = 10 * Math.sin(step);

			// Add code to displace the camera back-and-forth along a given direction
			camera.position.x = -50 + 10 * Math.sin(step *3);
			camera.position.z = 40 + 10 * Math.cos(step);
			camera.lookAt(scene.position);

			// Render using requestAnimationFrame
			requestAnimationFrame(renderScene);
			controls.update();
			renderer.render(scene, camera);
			} 
		}
		function onResize() { 
			camera.left = window.innerWidth / - 20;
			camera.right = window.innerWidth / 20;
			camera.top = window.innerHeight / 20;
			camera.bottom = window.innerHeight / - 20;
			camera.updateProjectionMatrix(); 
			renderer.setSize(window.innerWidth, window.innerHeight); 
		}
		window.addEventListener('resize', onResize, false);
		window.onload = init

	</script>

</body>

</html>
